<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C3D Playground</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">C3D Playground</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Playground</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="docs.html">Documentación</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid p-3">
        <div class="row mb-3">
            <div class="col-12">
                <div class="btn-toolbar" role="toolbar">
                    <div class="btn-group me-2" role="group">
                        <button type="button" class="btn btn-primary" id="runBtn">Ejecutar</button>
                        <button type="button" class="btn btn-outline-primary" id="stepBtn">Step</button>
                        <button type="button" class="btn btn-outline-warning" id="resetBtn">Reiniciar</button>
                        <button type="button" class="btn btn-secondary" id="clearBtn">Limpiar</button>
                        <button type="button" class="btn btn-outline-secondary" id="exampleBtn">Cargar Ejemplo</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Editor Panel -->
            <div class="col-lg-6 col-md-12 mb-3">
                <div class="card h-100">
                    <div class="card-header">
                        <h6 class="mb-0">Editor de Código C3D</h6>
                    </div>
                    <div class="card-body p-0">
                        <textarea id="codeEditor" class="form-control" rows="20" placeholder="Escribe tu código C3D aquí..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="col-lg-6 col-md-12">
                <!-- Output Panel -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h6 class="mb-0">Salida</h6>
                    </div>
                    <div class="card-body">
                        <div id="debugInfo" class="debug-info mb-2"></div>
                        <div id="output" class="output-panel"></div>
                        <div id="variablesDisplay" class="mt-3"></div>
                    </div>
                </div>

                <!-- Stack Panel -->
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">Stack (20 celdas)</h6>
                        <small class="text-muted" id="stackPointerLabel">pos = 0</small>
                    </div>
                    <div class="card-body p-0">
                        <div id="stackDisplay" class="stack-panel"></div>
                    </div>
                </div>

                <!-- Graph Panel -->
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Grafo de Bloques Básicos</h6>
                    </div>
                    <div class="card-body p-2">
                        <div id="graphContainer" class="graph-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Mermaid JS -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            }
        });
        window.mermaid = mermaid;
    </script>
    
    <!-- Application JS -->
    <script type="module" src="./src/App.js"></script>
</body>
</html>
